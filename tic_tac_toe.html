<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tic Tac Toe - Horror AI</title>

    <style>
        body {
            font-family: "Courier New", monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            background: radial-gradient(circle at center, #0a0a0a, #000000);
            color: #ff1a1a;
            overflow: hidden;
        }

        h1 {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 30px #8b0000;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(3, 110px);
            gap: 8px;
            margin-top: 20px;
            display: none;
        }

        .cell {
            width: 110px;
            height: 110px;
            background: #0f0f0f;
            border: 2px solid #2a0000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            color: #ff2a2a;
            text-shadow: 0 0 10px red;
            transition: 0.2s;
        }

        .cell:hover {
            background: #1a0000;
            box-shadow: 0 0 15px red;
            transform: scale(1.05);
        }

        #status {
            margin-top: 15px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px red;
            display: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            background: #000;
            border: 1px solid red;
            color: red;
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 0 20px red;
        }

        /* START SCREEN */
        .startScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #000, #000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .startScreen h2 {
            color: red;
            font-size: 2rem;
            text-shadow: 0 0 20px red;
            animation: flicker 0.2s infinite;
        }

        .startScreen button {
            font-size: 1.2rem;
            margin-top: 20px;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* HORROR OVERLAY */
        .stare {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 5%, rgba(0,0,0,0.97) 60%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s;
        }

        .stare.active {
            opacity: 1;
            animation: flicker2 0.12s infinite;
        }

        @keyframes flicker2 {
            0% { opacity: 0.9; }
            50% { opacity: 0.6; }
            100% { opacity: 0.95; }
        }

        .final {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: red;
            text-shadow: 0 0 20px red;
            display: none;
            text-align: center;
            white-space: pre-line;
        }

        .glitch {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, -2px); }
            80% { transform: translate(1px, 2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>

<body>

    <div class="startScreen" id="startScreen">
        <h2>☠ DO YOU WANT TO PLAY? ☠</h2>
        <button onclick="startGame()">ENTER IF YOU DARE</button>
    </div>

    <h1 class="glitch">☠ TIC TAC TOE ☠</h1>

    <div class="board" id="board"></div>

    <div id="status">...</div>

    <button onclick="resetGame()">Restart Ritual</button>

    <div class="stare" id="stare"></div>
    <div class="final" id="final"></div>

    <script>
        const board = document.getElementById("board");
        const statusText = document.getElementById("status");
        const stare = document.getElementById("stare");
        const finalScreen = document.getElementById("final");
        const startScreen = document.getElementById("startScreen");

        let human = "X";
        let bot = "O";
        let gameState = Array(9).fill("");
        let gameOver = false;

        const wins = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        function startGame() {
            startScreen.style.display = "none";
            board.style.display = "grid";
            statusText.style.display = "block";
            statusText.innerText = "You are already inside...";
            createBoard();
        }

        function createBoard() {
            board.innerHTML = "";

            gameState.forEach((cell, i) => {
                let div = document.createElement("div");
                div.classList.add("cell");
                div.innerText = cell;
                div.dataset.index = i;
                div.addEventListener("click", playerMove);
                board.appendChild(div);
            });
        }

        function playerMove(e) {
            if (gameOver) return;

            let i = e.target.dataset.index;
            if (gameState[i] !== "") return;

            gameState[i] = human;
            update();

            if (!checkWinner() && !gameState.every(v => v !== "")) {
                setTimeout(botMove, 400);
            }
        }

        function botMove() {
            if (gameOver) return;
            let move = bestMove();
            gameState[move] = bot;
            update();
        }

        // MINIMAX AI
        function bestMove() {
            let bestScore = -Infinity;
            let move;

            for (let i = 0; i < 9; i++) {
                if (gameState[i] === "") {
                    gameState[i] = bot;
                    let score = minimax(gameState, 0, false);
                    gameState[i] = "";

                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(board, depth, isMax) {
            let winner = checkWinnerState(board);

            if (winner === bot) return 10 - depth;
            if (winner === human) return depth - 10;
            if (board.every(v => v !== "")) return 0;

            if (isMax) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = bot;
                        best = Math.max(best, minimax(board, depth + 1, false));
                        board[i] = "";
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = human;
                        best = Math.min(best, minimax(board, depth + 1, true));
                        board[i] = "";
                    }
                }
                return best;
            }
        }

        function update() {
            createBoard();

            let winner = checkWinner();

            if (winner) {
                endGame(winner);
                return;
            }

            if (gameState.every(v => v !== "")) {
                endGame("draw");
                return;
            }

            statusText.innerText = "It is watching...";
        }

        function endGame(result) {
            gameOver = true;
            stare.classList.add("active");

            if (result === human) {
                finalScreen.innerText = "YOU WON...\nBUT IT REMEMBERS YOU.";
            } else if (result === bot) {
                finalScreen.innerText = "YOU LOST...\nIT WAS INSIDE THE BOARD ALL ALONG.";
            } else {
                finalScreen.innerText = "DRAW...\nYOU NEVER LEFT.";
            }

            finalScreen.style.display = "block";
            document.body.classList.add("glitch");
        }

        function checkWinner() {
            return checkWinnerState(gameState);
        }

        function checkWinnerState(state) {
            for (let c of wins) {
                let [a,b,c2] = c;
                if (state[a] && state[a] === state[b] && state[a] === state[c2]) {
                    return state[a];
                }
            }
            return null;
        }

        function resetGame() {
            gameState = Array(9).fill("");
            gameOver = false;
            stare.classList.remove("active");
            finalScreen.style.display = "none";
            document.body.classList.remove("glitch");

            statusText.innerText = "...";
            createBoard();
        }
    </script>

</body>
</html>
